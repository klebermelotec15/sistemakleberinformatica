<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleber Informática - Gestão Profissional v4.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 22px; color: var(--primary); }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 12px 20px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; color: #555; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fff; }
        
        .checklist-container { background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; }
        .checklist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; padding: 5px; }
        .check-item input { width: auto; transform: scale(1.2); }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        button { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; flex: 1; min-width: 150px; font-size: 14px; }
        .btn-save { background: var(--success); color: white; }
        .btn-new { background: #95a5a6; color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-pdf { background: var(--accent); color: white; }

        .os-card { background: #fff; border: 1px solid #eee; border-left: 6px solid var(--primary); padding: 18px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.06); cursor: pointer; transition: 0.2s; }
        .os-card:hover { transform: translateY(-3px); box-shadow: 0 5px 12px rgba(0,0,0,0.1); border-color: var(--accent); }
        
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; color: white; margin-top: 5px; font-weight: bold; }
        .status-aberto { background: var(--warning); }
        .status-finalizado { background: var(--success); }

        .hidden { display: none; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Kleber Informática</h1>
            <small id="modo-label" style="color: var(--accent); font-weight: bold;">MODO: NOVA ORDEM DE SERVIÇO</small>
        </div>
        <div style="text-align: right;">
            <div id="db-status" style="color: var(--success); font-weight: bold; font-size: 12px;">● FIRESTORE ONLINE</div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="btn-tab-nova" onclick="switchTab('nova')">FORMULÁRIO / OS</button>
        <button class="tab-btn" onclick="switchTab('historico')">HISTÓRICO (EDITAR)</button>
        <button class="tab-btn" onclick="switchTab('backup')">BACKUP</button>
    </div>

    <div id="tab-nova" class="tab-content">
        <input type="hidden" id="f-id"> <div class="grid">
            <div><label>Status do Serviço</label>
                <select id="f-status">
                    <option value="EM ABERTO">🟠 EM ABERTO / ORÇAMENTO</option>
                    <option value="FINALIZADO">🟢 FINALIZADO / PRONTO</option>
                    <option value="ENTREGUE">🔵 ENTREGUE AO CLIENTE</option>
                </select>
            </div>
            <div><label>WhatsApp</label><input type="tel" id="f-whatsapp" placeholder="Ex: 919XXXXXXXX"></div>
        </div>

        <div class="grid">
            <div><label>Cliente</label><input type="text" id="f-cliente" placeholder="Nome do Cliente"></div>
            <div><label>Equipamento / Aparelho</label><input type="text" id="f-equip" placeholder="Ex: Notebook Acer Nitro 5"></div>
        </div>

        <div class="checklist-container">
            <label style="margin-bottom: 12px; display: block;">Checklist de Entrada e Acessórios</label>
            <div class="checklist-grid">
                <label class="check-item"><input type="checkbox" class="chk" value="Carregador"> Carregador</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Teclado"> Teclado</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Monitor"> Monitor</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Adaptador Bluetooth"> Adapt. Bluetooth</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Adaptador Wi-Fi"> Adapt. Wi-Fi</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Adaptador de Áudio"> Adapt. Áudio</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Placa de Vídeo"> Placa de Vídeo</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Cabo de Força"> Cabo de Força</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Bateria"> Bateria</label>
                <label class="check-item"><input type="checkbox" class="chk" value="Mouse"> Mouse</label>
            </div>
        </div>

        <div class="grid">
            <div><label>1. Defeito Relatado</label><textarea id="f-defeito" rows="3"></textarea></div>
            <div><label>2. Serviço a Realizar / Feito</label><textarea id="f-servico" rows="3"></textarea></div>
        </div>

        <div class="grid">
            <div><label>Mão de Obra (R$)</label><input type="number" id="v-obra" value="0"></div>
            <div><label>Peças (R$)</label><input type="number" id="v-pecas" value="0"></div>
        </div>

        <div class="btn-group">
            <button class="btn-save" id="btn-principal" onclick="salvarServico()">SALVAR NO BANCO</button>
            <button class="btn-new" onclick="limparFormulario()">+ NOVA OS</button>
            <button class="btn-wa" onclick="enviarWhatsApp()">WHATSAPP (PDF)</button>
            <button class="btn-pdf" onclick="gerarPDF()">PDF</button>
        </div>
    </div>

    <div id="tab-historico" class="tab-content hidden">
        <label>Pesquisar Cliente para Editar</label>
        <input type="text" id="busca-nome" placeholder="Digite o nome (Ex: Mario Jorge)..." onkeyup="buscarNoBanco()">
        <p style="font-size: 11px; color: #777; margin-top: 5px;">* Clique no card do cliente para carregar os dados e fazer mudanças.</p>
        <div id="lista-resultados" style="margin-top: 15px;"></div>
    </div>

    <div id="tab-backup" class="tab-content hidden">
        <button class="btn-save" style="background: #8e44ad;" onclick="exportarBackup()">EXPORTAR TUDO (JSON)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXkyJBXMgh0Vi6dwOCr7oHthyVaq3hcPE",
        authDomain: "sistema-kleber-informatica.firebaseapp.com",
        projectId: "sistema-kleber-informatica",
        storageBucket: "sistema-kleber-informatica.firebasestorage.app",
        messagingSenderId: "916217534730",
        appId: "1:916217534730:web:477e2a1a1cf7f4873982f3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        if(event) event.currentTarget.classList.add('active');
    };

    // LIMPAR FORMULÁRIO
    window.limparFormulario = () => {
        document.getElementById('f-id').value = "";
        document.getElementById('f-cliente').value = "";
        document.getElementById('f-whatsapp').value = "";
        document.getElementById('f-equip').value = "";
        document.getElementById('f-defeito').value = "";
        document.getElementById('f-servico').value = "";
        document.getElementById('v-obra').value = "0";
        document.getElementById('v-pecas').value = "0";
        document.getElementById('f-status').value = "EM ABERTO";
        document.querySelectorAll('.chk').forEach(c => c.checked = false);
        document.getElementById('modo-label').innerText = "MODO: NOVA ORDEM DE SERVIÇO";
        document.getElementById('btn-principal').innerText = "SALVAR NO BANCO";
        alert("Pronto para um novo serviço!");
    };

    // SALVAR OU ATUALIZAR
    window.salvarServico = async () => {
        const idExistente = document.getElementById('f-id').value;
        const obra = parseFloat(document.getElementById('v-obra').value) || 0;
        const pecas = parseFloat(document.getElementById('v-pecas').value) || 0;
        
        const dados = {
            cliente: document.getElementById('f-cliente').value.toUpperCase(),
            whatsapp: document.getElementById('f-whatsapp').value,
            equip: document.getElementById('f-equip').value.toUpperCase(),
            defeito: document.getElementById('f-defeito').value,
            servico_realizar: document.getElementById('f-servico').value,
            checklist: Array.from(document.querySelectorAll('.chk:checked')).map(c => c.value),
            total: obra + pecas,
            status: document.getElementById('f-status').value,
            ultima_alteracao: new Date().toLocaleString('pt-BR')
        };

        try {
            if (idExistente) {
                // ATUALIZAR EXISTENTE
                await updateDoc(doc(db, "servicos", idExistente), dados);
                alert("✅ OS do " + dados.cliente + " atualizada com sucesso!");
            } else {
                // CRIAR NOVA
                dados.data = new Date().toLocaleString('pt-BR');
                dados.timestamp = new Date();
                await addDoc(collection(db, "servicos"), dados);
                alert("✅ Nova OS salva com sucesso!");
            }
            location.reload();
        } catch (e) { alert("Erro ao salvar: " + e); }
    };

    // BUSCAR E TORNAR CLICÁVEL
    window.buscarNoBanco = async () => {
        const termo = document.getElementById('busca-nome').value.toUpperCase();
        if(termo.length < 2) return;

        const q = query(collection(db, "servicos"), where("cliente", ">=", termo), where("cliente", "<=", termo + '\uf8ff'));
        const snap = await getDocs(q);
        const lista = document.getElementById('lista-resultados');
        lista.innerHTML = "";

        snap.forEach(documento => {
            const d = documento.data();
            const id = documento.id;
            const badgeClass = d.status === 'FINALIZADO' ? 'status-finalizado' : 'status-aberto';
            
            // Criamos o card e passamos os dados para a função de carregar
            const card = document.createElement('div');
            card.className = 'os-card';
            card.innerHTML = `
                <strong>${d.cliente}</strong> <span class="status-badge ${badgeClass}">${d.status || 'ABERTO'}</span><br>
                <small>Equip: ${d.equip || d.aparelho || 'N/A'}</small><br>
                <small>Data: ${d.data || 'N/A'}</small>
            `;
            card.onclick = () => carregarParaEdicao(id, d);
            lista.appendChild(card);
        });
    };

    // CARREGAR DADOS NO FORMULÁRIO
    window.carregarParaEdicao = (id, d) => {
        document.getElementById('f-id').value = id;
        document.getElementById('f-cliente').value = d.cliente;
        document.getElementById('f-whatsapp').value = d.whatsapp || "";
        document.getElementById('f-equip').value = d.equip || d.aparelho || "";
        document.getElementById('f-defeito').value = d.defeito || "";
        document.getElementById('f-servico').value = d.servico_realizar || "";
        document.getElementById('f-status').value = d.status || "EM ABERTO";
        
        // Marcar checklist
        document.querySelectorAll('.chk').forEach(c => {
            c.checked = d.checklist && d.checklist.includes(c.value);
        });

        document.getElementById('modo-label').innerText = "MODO: EDITANDO OS EXISTENTE";
        document.getElementById('btn-principal').innerText = "ATUALIZAR DADOS";
        
        switchTab('nova'); // Volta para a aba do formulário
        alert("Dados do " + d.cliente + " carregados para edição!");
    };

    // (Funções de PDF, WhatsApp e Backup permanecem iguais para manter a funcionalidade)
    window.gerarPDF = (isBlob = false) => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        const nome = document.getElementById('f-cliente').value || "Cliente";
        docPDF.text("KLEBER INFORMATICA - OS", 20, 20);
        docPDF.text(`CLIENTE: ${nome}`, 20, 40);
        docPDF.text(`EQUIPAMENTO: ${document.getElementById('f-equip').value}`, 20, 50);
        docPDF.text(`STATUS: ${document.getElementById('f-status').value}`, 20, 60);
        docPDF.text(`VALOR TOTAL: R$ ${parseFloat(document.getElementById('v-obra').value) + parseFloat(document.getElementById('v-pecas').value)}`, 20, 70);
        if(isBlob) return docPDF.output('blob');
        docPDF.save(`OS_${nome}.pdf`);
    };

    window.enviarWhatsApp = async () => {
        const nome = document.getElementById('f-cliente').value;
        const equip = document.getElementById('f-equip').value;
        const hora = new Date().getHours();
        const saudacao = (hora >= 5 && hora < 12) ? "Bom dia" : (hora >= 12 && hora < 18) ? "Boa tarde" : "Boa noite";
        const msg = `${saudacao}, ${nome}! Segue o orcamento do aparelho (${equip}).`;
        const pdfBlob = window.gerarPDF(true);
        const file = new File([pdfBlob], `Orcamento_${nome}.pdf`, { type: 'application/pdf' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Orcamento', text: msg });
        } else {
            const tel = document.getElementById('f-whatsapp').value.replace(/\D/g, '');
            window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`, '_blank');
        }
    };

    window.exportarBackup = async () => {
        const snap = await getDocs(collection(db, "servicos"));
        const data = [];
        snap.forEach(doc => data.push({id: doc.id, ...doc.data()}));
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_completo.json`;
        a.click();
    };
</script>
</body>
</html>
