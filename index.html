<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleber Informática - Sistema de OS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--primary); margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; color: var(--primary); font-size: 24px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 12px 25px; border: none; background: var(--light); border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; }

        .checklist-container { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin: 20px 0; }
        .checklist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
        .check-item input { width: auto; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 25px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .btn-save { background: var(--success); color: white; }
        .btn-auth { background: var(--accent); color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-backup { background: #8e44ad; color: white; }

        .history-list { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .os-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        
        .hidden { display: none; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Kleber Informática</h1>
            <span style="color: #666;">Sistema de Gestão On-line</span>
        </div>
        <div id="status-fb" style="font-size: 12px; color: var(--success);">● Firestore Conectado</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('nova')">1. Nova OS / Orçamento</button>
        <button class="tab-btn" onclick="switchTab('historico')">2. Histórico de Revisão</button>
        <button class="tab-btn" onclick="switchTab('config')">3. Backup e Sistema</button>
    </div>

    <div id="tab-nova" class="tab-content">
        <div class="grid">
            <div>
                <label>Nome do Cliente</label>
                <input type="text" id="cust-name" placeholder="Ex: João Silva">
            </div>
            <div>
                <label>WhatsApp (com DDD)</label>
                <input type="tel" id="cust-phone" placeholder="919XXXXXXXX">
            </div>
        </div>

        <div class="grid">
            <div>
                <label>Aparelho / Modelo</label>
                <input type="text" id="device-model" placeholder="Ex: Notebook Acer Aspire 5">
            </div>
            <div>
                <label>Número de Série</label>
                <input type="text" id="device-sn" placeholder="S/N ou Service Tag">
            </div>
        </div>

        <div class="checklist-container">
            <label>Checklist de Entrada e Estado Físico</label>
            <div class="checklist-grid">
                <label class="check-item"><input type="checkbox" class="os-check" value="Carregador"> Carregador</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Cabo de Força"> Cabo de Força</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Bateria"> Bateria</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Mouse"> Mouse</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Bolsa/Case"> Bolsa/Case</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Tela Trincada"> Tela Trincada</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Riscos na Carcaça"> Riscos Carcaça</label>
                <label class="check-item"><input type="checkbox" class="os-check" value="Parafusos Faltando"> Faltando Parafuso</label>
            </div>
        </div>

        <label>Defeito Relatado / Serviço a Realizar</label>
        <textarea id="service-desc" rows="3" placeholder="Descreva o problema detalhadamente..."></textarea>

        <div class="grid" style="margin-top: 15px;">
            <div>
                <label>Mão de Obra (R$)</label>
                <input type="number" id="price-labor" value="0">
            </div>
            <div>
                <label>Peças (R$)</label>
                <input type="number" id="price-parts" value="0">
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-save" onclick="salvarFirestore()">Salvar no Banco de Dados</button>
            <button class="btn-auth" onclick="prepararPDF('autorizacao')">Gerar Autorização</button>
            <button class="btn-wa" onclick="prepararWhatsApp()">Enviar Orçamento WhatsApp</button>
        </div>
    </div>

    <div id="tab-historico" class="tab-content hidden">
        <label>Buscar Histórico do Cliente</label>
        <input type="text" id="search-name" placeholder="Digite o nome para buscar revisões..." onkeyup="buscarRevisoes()">
        <div id="history-results" class="history-list"></div>
    </div>

    <div id="tab-config" class="tab-content hidden">
        <h3>Segurança dos Dados - Kleber Informática</h3>
        <p>Clique abaixo para baixar uma cópia completa de todas as OS do Firestore em formato JSON.</p>
        <button class="btn-backup" onclick="exportarBackupJSON()">Exportar Backup Completo</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "SEU_PROJETO.firebaseapp.com",
        projectId: "SEU_PROJETO",
        storageBucket: "SEU_PROJETO.appspot.com",
        messagingSenderId: "SEU_ID",
        appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. ALTERNAR ABAS
    window.switchTab = (tab) => {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    };

    // 2. SALVAR NO FIRESTORE
    window.salvarFirestore = async () => {
        const checks = Array.from(document.querySelectorAll('.os-check:checked')).map(c => c.value);
        const dados = {
            cliente: document.getElementById('cust-name').value,
            telefone: document.getElementById('cust-phone').value,
            aparelho: document.getElementById('device-model').value,
            serial: document.getElementById('device-sn').value,
            checklist: checks,
            defeito: document.getElementById('service-desc').value,
            maoObra: parseFloat(document.getElementById('price-labor').value),
            pecas: parseFloat(document.getElementById('price-parts').value),
            total: parseFloat(document.getElementById('price-labor').value) + parseFloat(document.getElementById('price-parts').value),
            data: new Date().toLocaleDateString('pt-BR'),
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "ordens_servico"), dados);
            alert("Ordem de Serviço salva com sucesso no Firebase!");
        } catch (e) { alert("Erro ao salvar: " + e); }
    };

    // 3. HISTÓRICO DE REVISÃO
    window.buscarRevisoes = async () => {
        const termo = document.getElementById('search-name').value;
        if(termo.length < 3) return;

        const q = query(collection(db, "ordens_servico"), where("cliente", ">=", termo), where("cliente", "<=", termo + '\uf8ff'));
        const querySnapshot = await getDocs(q);
        const container = document.getElementById('history-results');
        container.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const d = doc.data();
            container.innerHTML += `
                <div class="os-card">
                    <strong>Data: ${d.data}</strong> - ${d.aparelho}<br>
                    <small>Defeito: ${d.defeito}</small><br>
                    <small>Checklist: ${d.checklist.join(', ')}</small>
                </div>`;
        });
    };

    // 4. LÓGICA DE WHATSAPP E SAUDAÇÃO
    window.prepararWhatsApp = async () => {
        const nome = document.getElementById('cust-name').value;
        const aparelho = document.getElementById('device-model').value;
        
        const hora = new Date().getHours();
        let saudacao = (hora >= 5 && hora < 12) ? "Bom dia" : (hora >= 12 && hora < 18) ? "Boa tarde" : "Boa noite";
        
        const mensagemTexto = `${saudacao}, ${nome}! Tudo bem?\n\nInforme: segue o orçamento do serviço do determinado aparelho (${aparelho}).`;
        
        // Gera o PDF via Blob para compartilhamento manual assistido
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("ORÇAMENTO - KLEBER INFORMÁTICA", 20, 20);
        doc.text(`Cliente: ${nome}`, 20, 30);
        doc.text(`Aparelho: ${aparelho}`, 20, 40);
        doc.text(`Valor Total: R$ ${parseFloat(document.getElementById('price-labor').value) + parseFloat(document.getElementById('price-parts').value)}`, 20, 50);
        
        const pdfBlob = doc.output('blob');
        const file = new File([pdfBlob], `Orcamento_${nome}.pdf`, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Orçamento', text: mensagemTexto });
        } else {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(mensagemTexto)}`, '_blank');
        }
    };

    // 5. BACKUP JSON
    window.exportarBackupJSON = async () => {
        const querySnapshot = await getDocs(collection(db, "ordens_servico"));
        const backup = [];
        querySnapshot.forEach(doc => backup.push(doc.data()));
        
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `backup_kleber_info_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    };
</script>

</body>
</html>
