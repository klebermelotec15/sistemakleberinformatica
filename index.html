<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleber Informática - Gestor de OS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #ffc107; --danger: #dc3545; --dark: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .full { grid-column: span 2; }
        label { font-weight: bold; font-size: 13px; color: #666; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; color: white; transition: 0.3s; }
        .btn-blue { background: var(--primary); }
        .btn-green { background: var(--success); }
        .btn-red { background: var(--danger); }
        
        /* Status Badges */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; color: white; }
        .status-aberto { background: var(--danger); }
        .status-executando { background: var(--warning); color: black; }
        .status-concluida { background: #17a2b8; }
        .status-finalizada { background: var(--success); }

        /* Impressão */
        #documento { display: none; border: 2px solid #000; padding: 40px; background: white; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        
        /* Histórico */
        .os-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .os-info { flex-grow: 1; }

        @media print {
            .no-print { display: none !important; }
            #documento { display: block !important; border: none; padding: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h2>🛠️ Gestão de Ordem de Serviço</h2>
        
        <details style="background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <summary>⚙️ Configurações da Loja</summary>
            <div class="grid" style="margin-top:10px;">
                <div><label>Logo:</label><input type="file" id="inputLogo"></div>
                <div><label>Telefone:</label><input type="text" id="lojaTel"></div>
                <div class="full"><label>Endereço:</label><input type="text" id="lojaEnd"></div>
            </div>
            <button class="btn-blue" onclick="salvarConfig()" style="width:200px">Salvar Config</button>
        </details>

        <div id="avisoEdicao" style="display:none; background: #fff3cd; padding:15px; border: 1px solid #ffeeba; border-radius:8px; margin-bottom:20px;">
            <strong>✏️ Editando OS: <span id="idEdicao"></span></strong>
            <button onclick="location.reload()" style="background:none; color:red; cursor:pointer; width:auto; padding:0; margin-left:15px;">[Cancelar]</button>
        </div>

        <div class="grid">
            <div><label>Situação da OS:</label>
                <select id="status">
                    <option value="EM ABERTO">🔴 EM ABERTO</option>
                    <option value="EXECUTANDO">🟡 EXECUTANDO</option>
                    <option value="CONCLUÍDA">🔵 CONCLUÍDA</option>
                    <option value="FINALIZADA">🟢 FINALIZADA</option>
                </select>
            </div>
            <div><label>Cliente:</label><input type="text" id="cliente"></div>
            <div><label>WhatsApp:</label><input type="text" id="whatsapp"></div>
            <div><label>Equipamento:</label><input type="text" id="equip"></div>
            <div class="full"><label>Relato do Defeito / Serviço:</label><textarea id="defeito" rows="2"></textarea></div>
            <div><label>Valor Peças:</label><input type="number" id="vPecas" value="0"></div>
            <div><label>Mão de Obra:</label><input type="number" id="vObra" value="0"></div>
        </div>

        <div class="btn-group">
            <button class="btn-blue" onclick="salvarOS('ENTRADA')">GERAR ENTRADA</button>
            <button class="btn-green" onclick="salvarOS('RECIBO')">GERAR RECIBO/FINAL</button>
        </div>
    </div>

    <div id="documento">
        <div style="text-align:center; border-bottom:2px solid #000; margin-bottom:20px;">
            <img id="docLogo" style="max-height:80px; display:none;">
            <h3>Kleber Informática</h3>
            <p id="docEnd"></p>
            <h2>ORDEM DE SERVIÇO Nº: <span id="resOS"></span></h2>
        </div>
        <div class="info-row"><strong>STATUS:</strong> <span id="resStatus"></span></div>
        <div class="info-row"><strong>DATA:</strong> <span id="resData"></span></div>
        <div class="info-row"><strong>CLIENTE:</strong> <span id="resCliente"></span></div>
        <div class="info-row"><strong>EQUIPAMENTO:</strong> <span id="resEquip"></span></div>
        <div class="info-row"><strong>DEFEITO:</strong> <span id="resDefeito"></span></div>
        <div class="info-row" style="background:#eee; font-size:18px;"><strong>TOTAL:</strong> <span id="resTotal"></span></div>
        <div style="margin-top:50px; text-align:center;"><p>_________________________________</p><p>Assinatura</p></div>
        <button class="btn-blue no-print" onclick="window.print()">IMPRIMIR</button>
    </div>

    <div class="historico no-print" style="margin-top:30px;">
        <h3>📋 Lista de Ordens de Serviço</h3>
        <input type="text" id="busca" onkeyup="buscar()" placeholder="Buscar por nome ou equipamento..." style="margin-bottom:15px;">
        <div id="listaHistorico">Carregando...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDKxyJBXMgh0Vi6dwOCr7oHthyVaq3hcPE",
        authDomain: "sistema-kleber-informatica.firebaseapp.com",
        projectId: "sistema-kleber-informatica",
        storageBucket: "sistema-kleber-informatica.firebasestorage.app",
        messagingSenderId: "374020359871",
        appId: "1:374020359871:web:e0f6c77f0a672e8116749d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editandoId = null;

    window.onload = function() {
        document.getElementById('lojaEnd').value = localStorage.getItem('end') || "";
        document.getElementById('lojaTel').value = localStorage.getItem('tel') || "";
        carregarLista();
    };

    function salvarConfig() {
        localStorage.setItem('end', document.getElementById('lojaEnd').value);
        localStorage.setItem('tel', document.getElementById('lojaTel').value);
        const logo = document.getElementById('inputLogo').files[0];
        if(logo) {
            const reader = new FileReader();
            reader.onload = (e) => localStorage.setItem('logo', e.target.result);
            reader.readAsDataURL(logo);
        }
        alert("Configurações salvas!");
    }

    async function obterProximaOS() {
        const snap = await db.collection("servicos").orderBy("os", "desc").limit(1).get();
        if (snap.empty) return 1;
        return snap.docs[0].data().os + 1;
    }

    async function salvarOS(tipoDoc) {
        const p = parseFloat(document.getElementById('vPecas').value) || 0;
        const o = parseFloat(document.getElementById('vObra').value) || 0;
        
        let osNum;
        if(editandoId) {
            osNum = parseInt(document.getElementById('idEdicao').innerText);
        } else {
            osNum = await obterProximaOS();
        }

        const dados = {
            os: osNum,
            status: document.getElementById('status').value,
            cliente: document.getElementById('cliente').value.toUpperCase(),
            whatsapp: document.getElementById('whatsapp').value,
            equip: document.getElementById('equip').value.toUpperCase(),
            defeito: document.getElementById('defeito').value,
            total: p + o,
            data: new Date().toLocaleString('pt-BR')
        };

        try {
            if(editandoId) {
                await db.collection("servicos").doc(editandoId).update(dados);
                editandoId = null;
            } else {
                await db.collection("servicos").add(dados);
            }
            imprimirDoc(dados, tipoDoc);
            carregarLista();
        } catch(e) { alert("Erro ao salvar: " + e.message); }
    }

    function imprimirDoc(d, tipo) {
        const logo = localStorage.getItem('logo');
        if(logo) { document.getElementById('docLogo').src = logo; document.getElementById('docLogo').style.display = 'block'; }
        document.getElementById('docEnd').innerText = localStorage.getItem('end') + " | " + localStorage.getItem('tel');
        document.getElementById('resOS').innerText = d.os;
        document.getElementById('resStatus').innerText = d.status;
        document.getElementById('resData').innerText = d.data;
        document.getElementById('resCliente').innerText = d.cliente;
        document.getElementById('resEquip').innerText = d.equip;
        document.getElementById('resDefeito').innerText = d.defeito;
        document.getElementById('resTotal').innerText = tipo === 'ENTRADA' ? "EM ANÁLISE" : "R$ " + d.total.toFixed(2);
        document.getElementById('documento').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    async function carregarLista() {
        const snap = await db.collection("servicos").orderBy("os", "desc").get();
        renderizar(snap);
    }

    function renderizar(snap) {
        let html = "";
        snap.forEach(doc => {
            const d = doc.data();
            const cor = d.status === 'EM ABERTO' ? 'status-aberto' : d.status === 'EXECUTANDO' ? 'status-executando' : d.status === 'CONCLUÍDA' ? 'status-concluida' : 'status-finalizada';
            html += `
            <div class="os-card">
                <div class="os-info">
                    <strong>#${d.os} - ${d.cliente}</strong> <span class="badge ${cor}">${d.status}</span><br>
                    <small>${d.equip} | R$ ${d.total.toFixed(2)}</small>
                </div>
                <div>
                    <button onclick="prepararEdicao('${doc.id}')" style="background:orange; width:40px; margin-right:5px;">✏️</button>
                    <button onclick="excluirOS('${doc.id}')" style="background:red; width:40px;">🗑️</button>
                </div>
            </div>`;
        });
        document.getElementById('listaHistorico').innerHTML = html;
    }

    async function excluirOS(id) {
        if(confirm("Deseja realmente excluir esta OS permanentemente?")) {
            await db.collection("servicos").doc(id).delete();
            carregarLista();
        }
    }

    async function prepararEdicao(id) {
        const doc = await db.collection("servicos").doc(id).get();
        const d = doc.data();
        document.getElementById('status').value = d.status;
        document.getElementById('cliente').value = d.cliente;
        document.getElementById('whatsapp').value = d.whatsapp;
        document.getElementById('equip').value = d.equip;
        document.getElementById('defeito').value = d.defeito;
        document.getElementById('vObra').value = d.total; // Simplificado para a edição
        editandoId = id;
        document.getElementById('idEdicao').innerText = d.os;
        document.getElementById('avisoEdicao').style.display = 'block';
        window.scrollTo(0,0);
    }

    async function buscar() {
        const termo = document.getElementById('busca').value.toUpperCase();
        const snap = await db.collection("servicos").get();
        const docsFiltrados = snap.docs.filter(doc => {
            const d = doc.data();
            return d.cliente.includes(termo) || d.equip.includes(termo) || d.os.toString().includes(termo);
        });
        renderizar(docsFiltrados);
    }
</script>
</body>
</html>
